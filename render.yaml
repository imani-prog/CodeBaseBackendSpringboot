services:
  - type: web
    name: medilink-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      # NeonDB (set values in Render dashboard, not here)
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # JPA config
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "9000000000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
