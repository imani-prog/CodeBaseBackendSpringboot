spring.application.name=CodeBaseBackend

# Spring Datasource Configuration

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medilinkdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Timo9380}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8080
server.error.whitelabel.enabled=false

# JPA open-in-view (disable to avoid lazy loading issues)
spring.jpa.open-in-view=false

# Suppress Spring Security AuthenticationProvider warning
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# Logging Level
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

jwt.secret=${JWT_SECRET:JWT_SECRET:fUHh0KrnXPqjOxPJUdrBxFOhK464uU4Ayl3AQEA8m0U}
jwt.expiration=${JWT_EXPIRATION:9000000000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
